name: Check Roblox Sales

concurrency:
  group: check-sales
  cancel-in-progress: false

on:
  workflow_dispatch: {}
  schedule:
    - cron: '*/5 * * * *'
permissions:
  contents: write
jobs:
  check-sales:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Run sale checker
        env:
          ROBLOX_COOKIE: ${{ secrets.ROBLOX_COOKIE }}
        run: python scripts/check_sales.py
      - name: Commit updated state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/last_seen.json
          git diff --staged --quiet || git commit -m "Update last seen sales"
          git pull --rebase origin main
          git push
